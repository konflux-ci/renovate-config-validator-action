name: "Validate renovate.json config file"

on:
  push:
    branches: 
      - main
  pull_request:
   
jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check length of AGENTS.md (max 300 lines)
        run: |
          set -euo pipefail
          lines=$(wc -l < AGENTS.md)
          echo "AGENTS.md line count: ${lines}"
          if [ "${lines}" -gt 300 ]; then
            echo "::warning file=AGENTS.md::AGENTS.md has ${lines} lines (max 300)."
            exit 1
          fi
  config-file-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          config_file: test/renovate.json
      - uses: ./
      